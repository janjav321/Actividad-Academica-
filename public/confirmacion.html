<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación — UNIBE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f7f4ef; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #0a1628; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; }
  .logo-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #c9a84c; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 15px; color: #c9a84c; font-weight: 700; }
  .header-text h1 { font-family: 'Playfair Display', serif; font-size: 16px; color: white; font-weight: 600; }
  .header-text p { font-size: 11px; color: #e8c97a; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 300; margin-top: 1px; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
  .card { background: white; border-radius: 20px; padding: 2rem; border: 1px solid #e2ddd6; box-shadow: 0 4px 40px rgba(10,22,40,0.08); max-width: 420px; width: 100%; text-align: center; }
  .icon-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 1.25rem; }
  .icon-circle.ok { background: #16a34a; color: white; }
  .icon-circle.error { background: #dc2626; color: white; }
  h2 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-bottom: 0.25rem; }
  h2.ok { color: #14532d; }
  h2.error { color: #7f1d1d; }
  .sub { font-size: 14px; color: #6b7280; margin-bottom: 1.5rem; }
  .info-box { background: #f7f4ef; border-radius: 12px; padding: 1.25rem; text-align: left; }
  .info-row { display: flex; flex-direction: column; margin-bottom: 0.75rem; }
  .info-row:last-child { margin-bottom: 0; }
  .info-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; font-weight: 500; }
  .info-value { font-size: 15px; color: #1a1a2e; font-weight: 500; margin-top: 2px; }
  .divider { height: 1px; background: #e2ddd6; margin: 1.25rem 0; }
  .badge { display: inline-block; background: #dcfce7; color: #166534; font-size: 13px; padding: 5px 16px; border-radius: 999px; font-weight: 500; border: 1px solid #bbf7d0; }
  #loading { color: #6b7280; font-size: 15px; padding: 2rem; }
</style>
</head>
<body>
<header>
  <div class="logo-circle">U</div>
  <div class="header-text">
    <h1>UNIBE</h1>
    <p>Universidad Iberoamericana</p>
  </div>
</header>
<main>
  <div class="card">
    <p id="loading">Verificando registro...</p>
    <div id="content" style="display:none"></div>
  </div>
</main>
<script>
async function verificar() {
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get('codigo');

  if (!codigo) {
    mostrarError('Código no válido.');
    return;
  }

  try {
    const res = await fetch(`/api/verificar?codigo=${encodeURIComponent(codigo)}`);
    const data = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    if (data.encontrado && data.persona) {
      const p = data.persona;
      document.getElementById('content').innerHTML = `
        <div class="icon-circle ok">✓</div>
        <h2 class="ok">Registrado</h2>
        <p class="sub">Acceso confirmado al evento</p>
        <div class="info-box">
          <div class="info-row"><span class="info-label">Nombre completo</span><span class="info-value">${p.nombre} ${p.apellido}</span></div>
          <div class="info-row"><span class="info-label">Cédula</span><span class="info-value">${p.cedula}</span></div>
          <div class="info-row"><span class="info-label">Correo</span><span class="info-value">${p.email}</span></div>
          <div class="info-row"><span class="info-label">Teléfono</span><span class="info-value">${p.tel}</span></div>
        </div>
        <div class="divider"></div>
        <span class="badge">✓ Registro verificado</span>
      `;
    } else {
      mostrarError('Esta persona no está registrada.');
    }
  } catch(e) {
    mostrarError('Error de conexión. Intenta de nuevo.');
  }
}

function mostrarError(msg) {
  document.getElementById('loading').style.display = 'none';
  const c = document.getElementById('content');
  c.style.display = 'block';
  c.innerHTML = `
    <div class="icon-circle error">✕</div>
    <h2 class="error">No registrado</h2>
    <p class="sub">${msg}</p>
  `;
}

verificar();
</script>
</body>
</html>
